
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxel Knockoff - Local Textures</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: monospace; background: #87CEEB; user-select: none; }
        #info { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; pointer-events: none; }
        canvas { display: block; }
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px;
            background: white; border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; mix-blend-mode: difference;
        }
    </style>
</head>
<body>
    <div id="info">
        <div>FPS: <span id="fps">0</span></div>
        <div>Blocks Loaded: <span id="chunkCount">0</span></div>
        <div>WASD: Move | SPACE: Fly Up | SHIFT: Fly Down</div>
        <div>Click to Play</div>
    </div>
    <div id="crosshair"></div>

    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- 1. ASSET MANAGEMENT ---
        // Using "./" pulls files from the exact same folder/directory as this HTML file
        const TEXTURES = {
            grass_top: './textures/grass_top.png',
            grass_side: './textures/grass_side.png',
            dirt: './textures/dirt.png',
            wood_top: './textures/oak_top.png',
            wood_side: './textures/oak_side.png',
            leaves: './textures/leaves.png'
        };

        const tileSize = 16;
        const atlasCanvas = document.createElement('canvas');
        atlasCanvas.width = 64;
        atlasCanvas.height = 64;
        const ctx = atlasCanvas.getContext('2d');
        
        const atlasTexture = new THREE.CanvasTexture(atlasCanvas);
        atlasTexture.magFilter = THREE.NearestFilter;
        atlasTexture.minFilter = THREE.NearestFilter;
        atlasTexture.colorSpace = THREE.SRGBColorSpace;

        const tileMap = {
            grass_top: 0, grass_side: 1, dirt: 2,
            wood_top: 3, wood_side: 4, leaves: 5
        };

        // --- 2. UV MAPPING ---
        function getUVs(tileIndex) {
            const tilesPerRow = 4;
            const step = 1 / tilesPerRow;
            const x = (tileIndex % tilesPerRow) * step;
            const y = 1 - (Math.floor(tileIndex / tilesPerRow) + 1) * step;
            return [ x, y, x + step, y, x + step, y + step, x, y + step ];
        }

        function hash(x, y) {
            const seed = 1337;
            let h = x * 374761393 + y * 668265263 + seed * 982451653;
            h = (h ^ (h >> 13)) * 1274126177;
            return ((h ^ (h >> 16)) >>> 0) / 4294967295;
        }

        function smoothNoise(x, y) {
            const ix = Math.floor(x), iy = Math.floor(y);
            const fx = x - ix, fy = y - iy;
            const a = hash(ix, iy), b = hash(ix + 1, iy);
            const c = hash(ix, iy + 1), d = hash(ix + 1, iy + 1);
            const ux = fx * fx * (3 - 2 * fx), uy = fy * fy * (3 - 2 * fy);
            return a * (1 - ux) * (1 - uy) + b * ux * (1 - uy) + c * (1 - ux) * uy + d * ux * uy;
        }

        // --- 3. CONFIG ---
        const CHUNK_SIZE = 16;
        const WORLD_HEIGHT = 32;
        const RENDER_DISTANCE = 4;
        const material = new THREE.MeshLambertMaterial({ map: atlasTexture });

        let scene, camera, renderer, controls;
        let chunks = {};
        let chunkData = {}; 
        const keys = { w: false, a: false, s: false, d: false, ' ': false, shift: false };

        // --- 4. INIT ---
        async function init() {
            const loadPromises = Object.entries(TEXTURES).map(([name, url]) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    // crossOrigin is still fine here, but technically not strictly 
                    // necessary when loading from the same GitHub Pages domain.
                    img.crossOrigin = "Anonymous"; 
                    img.onload = () => {
                        const idx = tileMap[name];
                        const x = (idx % 4) * tileSize;
                        const y = Math.floor(idx / 4) * tileSize;
                        ctx.drawImage(img, x, y, tileSize, tileSize);
                        resolve();
                    };
                    img.onerror = () => { 
                        console.warn(`Failed to load: ${url} (Check your folder structure!)`); 
                        resolve(); 
                    };
                    img.src = url;
                });
            });
            await Promise.all(loadPromises);
            atlasTexture.needsUpdate = true;

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 10, RENDER_DISTANCE * CHUNK_SIZE);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 20, 0);

            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(50, 100, 50);
            scene.add(sun);

            controls = new PointerLockControls(camera, document.body);
            document.body.addEventListener('click', () => controls.lock());

            document.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
            document.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate();
        }

        // --- 5. CHUNK DATA & TREES ---
        const BLOCK_IDS = { 'dirt': 1, 'grass': 2, 'wood': 3, 'leaves': 4 };

        function getChunkData(cx, cz) {
            const key = `${cx},${cz}`;
            if (chunkData[key]) return chunkData[key];

            const data = new Uint8Array(CHUNK_SIZE * CHUNK_SIZE * WORLD_HEIGHT).fill(0);
            
            for (let x = 0; x < CHUNK_SIZE; x++) {
                for (let z = 0; z < CHUNK_SIZE; z++) {
                    const worldX = cx * CHUNK_SIZE + x;
                    const worldZ = cz * CHUNK_SIZE + z;
                    const height = Math.floor(smoothNoise(worldX * 0.05, worldZ * 0.05) * 8) + 8;

                    for (let y = 0; y < WORLD_HEIGHT; y++) {
                        let type = 0;
                        if (y < height - 2) type = BLOCK_IDS['dirt'];
                        else if (y < height) type = BLOCK_IDS['grass'];
                        if (type > 0) data[x + z * CHUNK_SIZE + y * CHUNK_SIZE * CHUNK_SIZE] = type;
                    }

                    if (height < WORLD_HEIGHT - 6) {
                        const topBlockIdx = x + z * CHUNK_SIZE + (height - 1) * CHUNK_SIZE * CHUNK_SIZE;
                        if (data[topBlockIdx] === BLOCK_IDS['grass']) {
                            if (hash(worldX, worldZ) > 0.95) {
                                const treeBase = height;
                                for(let th=0; th<5; th++) setBlock(data, x, treeBase + th, z, BLOCK_IDS['wood']);
                                
                                const leafCenter = treeBase + 4;
                                for (let ly = -2; ly <= 1; ly++) {
                                    for (let lx = -1; lx <= 1; lx++) {
                                        for (let lz = -1; lz <= 1; lz++) {
                                            if (lx===0 && lz===0 && ly >= -1) continue; 
                                            if (x+lx >=0 && x+lx < CHUNK_SIZE && z+lz >=0 && z+lz < CHUNK_SIZE) {
                                                 setBlock(data, x+lx, leafCenter+ly, z+lz, BLOCK_IDS['leaves']);
                                            }
                                        }
                                    }
                                }
                            }
                        }
                    }
                }
            }
            chunkData[key] = data;
            return data;
        }

        function getBlock(data, x, y, z) {
            if (x < 0 || x >= CHUNK_SIZE || z < 0 || z >= CHUNK_SIZE || y < 0 || y >= WORLD_HEIGHT) return 0;
            return data[x + z * CHUNK_SIZE + y * CHUNK_SIZE * CHUNK_SIZE];
        }
        function setBlock(data, x, y, z, id) {
            if (x >= 0 && x < CHUNK_SIZE && z >= 0 && z < CHUNK_SIZE && y >= 0 && y < WORLD_HEIGHT) {
                data[x + z * CHUNK_SIZE + y * CHUNK_SIZE * CHUNK_SIZE] = id;
            }
        }

        function getWorldBlock(wx, wy, wz) {
            if (wy < 0 || wy >= WORLD_HEIGHT) return 0;
            const cx = Math.floor(wx / CHUNK_SIZE);
            const cz = Math.floor(wz / CHUNK_SIZE);
            let lx = Math.floor(wx % CHUNK_SIZE);
            let lz = Math.floor(wz % CHUNK_SIZE);
            if (lx < 0) lx += CHUNK_SIZE;
            if (lz < 0) lz += CHUNK_SIZE;
            const chunk = getChunkData(cx, cz);
            return getBlock(chunk, lx, wy, lz);
        }

        // --- 6. MESH BUILDING ---
        function buildChunkMesh(cx, cz) {
            const data = getChunkData(cx, cz);
            const geometry = new THREE.BufferGeometry();
            const positions = [], uvCoords = [], indices = [];
            let vertexIndex = 0;

            const addFace = (x, y, z, face, tileIndex) => {
                const s = 0.5;
                const faces = {
                    top: [[-s, s, -s], [s, s, -s], [s, s, s], [-s, s, s]],
                    bottom: [[-s, -s, s], [s, -s, s], [s, -s, -s], [-s, -s, -s]],
                    front: [[-s, -s, s], [s, -s, s], [s, s, s], [-s, s, s]],
                    back: [[s, -s, -s], [-s, -s, -s], [-s, s, -s], [s, s, -s]],
                    left: [[-s, -s, -s], [-s, -s, s], [-s, s, s], [-s, s, -s]],
                    right: [[s, -s, s], [s, -s, -s], [s, s, -s], [s, s, s]]
                };
                const corners = faces[face];
                for(let i=0; i<4; i++) positions.push(x + corners[i][0], y + corners[i][1], z + corners[i][2]);
                uvCoords.push(...getUVs(tileIndex));
                indices.push(vertexIndex, vertexIndex + 1, vertexIndex + 2, vertexIndex, vertexIndex + 2, vertexIndex + 3);
                vertexIndex += 4;
            };

            const getTileForBlock = (id, face) => {
                if (id === BLOCK_IDS['grass']) {
                    if (face === 'top') return tileMap['grass_top'];
                    if (face === 'bottom') return tileMap['dirt'];
                    return tileMap['grass_side'];
                }
                if (id === BLOCK_IDS['wood']) {
                    if (face === 'top' || face === 'bottom') return tileMap['wood_top'];
                    return tileMap['wood_side'];
                }
                if (id === BLOCK_IDS['leaves']) return tileMap['leaves'];
                if (id === BLOCK_IDS['dirt']) return tileMap['dirt'];
                return tileMap['dirt'];
            };

            for (let y = 0; y < WORLD_HEIGHT; y++) {
                for (let z = 0; z < CHUNK_SIZE; z++) {
                    for (let x = 0; x < CHUNK_SIZE; x++) {
                        const id = getBlock(data, x, y, z);
                        if (id === 0) continue;

                        const worldX = cx * CHUNK_SIZE + x;
                        const worldZ = cz * CHUNK_SIZE + z;
                        const nx = (dx, dy, dz) => getWorldBlock(worldX + dx, y + dy, worldZ + dz) === 0;

                        if (nx(0, 1, 0)) addFace(worldX, y, worldZ, 'top', getTileForBlock(id, 'top'));
                        if (nx(0, -1, 0)) addFace(worldX, y, worldZ, 'bottom', getTileForBlock(id, 'bottom'));
                        if (nx(1, 0, 0)) addFace(worldX, y, worldZ, 'right', getTileForBlock(id, 'side'));
                        if (nx(-1, 0, 0)) addFace(worldX, y, worldZ, 'left', getTileForBlock(id, 'side'));
                        if (nx(0, 0, 1)) addFace(worldX, y, worldZ, 'front', getTileForBlock(id, 'side'));
                        if (nx(0, 0, -1)) addFace(worldX, y, worldZ, 'back', getTileForBlock(id, 'side'));
                    }
                }
            }

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('uv', new THREE.Float32BufferAttribute(uvCoords, 2));
            geometry.setIndex(indices);
            geometry.computeVertexNormals();

            return new THREE.Mesh(geometry, material);
        }

        function updateChunks() {
            const camChunkX = Math.floor(camera.position.x / CHUNK_SIZE);
            const camChunkZ = Math.floor(camera.position.z / CHUNK_SIZE);

            for (let x = -RENDER_DISTANCE; x <= RENDER_DISTANCE; x++) {
                for (let z = -RENDER_DISTANCE; z <= RENDER_DISTANCE; z++) {
                    const cx = camChunkX + x;
                    const cz = camChunkZ + z;
                    const key = `${cx},${cz}`;
                    if (!chunks[key]) {
                        getChunkData(cx, cz);
                        const mesh = buildChunkMesh(cx, cz);
                        scene.add(mesh);
                        chunks[key] = mesh;
                    }
                }
            }

            for (const key in chunks) {
                const [cx, cz] = key.split(',').map(Number);
                if (Math.abs(cx - camChunkX) > RENDER_DISTANCE + 1 || Math.abs(cz - camChunkZ) > RENDER_DISTANCE + 1) {
                    scene.remove(chunks[key]);
                    chunks[key].geometry.dispose();
                    delete chunks[key];
                }
            }
            document.getElementById('chunkCount').innerText = Object.keys(chunks).length;
        }

        // --- 7. FLY MODE LOOP ---
        let lastFrameTime = performance.now();

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();
            const delta = (time - lastFrameTime) / 1000;
            lastFrameTime = time;

            if (Math.random() > 0.95) document.getElementById('fps').innerText = Math.round(1 / delta);

            if (controls.isLocked) {
                const speed = 10;
                if (keys.w) controls.moveForward(speed * delta);
                if (keys.s) controls.moveForward(-speed * delta);
                if (keys.a) controls.moveRight(-speed * delta);
                if (keys.d) controls.moveRight(speed * delta);
                if (keys[' ']) camera.position.y += speed * delta;
                if (keys.shift) camera.position.y -= speed * delta;
            }

            updateChunks();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
